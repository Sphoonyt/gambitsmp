# GambitSMP configuration

max-equipped-cards: 5

# how a card is "activated" for the ones with cooldowns:
# right-click while sneaking with an empty hand cycles through your
# equipped active cards and triggers the next one that's off cooldown.
active-trigger: sneak-right-click

hearts-lost-on-death-without-cards: 2
max-hearts: 20

drop:
  mystery-card-enabled: true

shrines:
  glory-heart-gain: 1
  abysmal-heart-cost: 1
  opportunity-reroll-cost: 1

cooldowns:
  nightbringer-seconds: 180
  warden-beam-seconds: 180
  gravity-seconds: 120
  negation-seconds: 45
  berserk-seconds: 30

chances:
  frozen-anchor: 0.08       # nerfed from 0.15
  grounding-bolt: 0.10
  metal-thief: 0.25
  heavy-swing: 0.03         # nerfed from 0.05
  dark-hours-per-minute: 0.10
  gruesome-harvest-per-30s: 0.10
  greeds-touch: 0.25        # now also has a 5s cooldown between procs, see CombatListener
  vampiric: 0.20            # reworked from a guaranteed proc every 10s to a 20% chance

# Phantom rework: land this many hits to trigger a burst of true invisibility
phantom:
  hits-needed: 3
  duration-ticks: 100   # 5 seconds

card-dimension:
  world-name: CardDimension
  overworld-world-name: world   # the world CardDimension's portal sends players to
  surface-y: 64
  portal-width: 5    # interior width (blocks between the side posts)
  portal-height: 4   # interior height (blocks between the lintel and sill)
  ore:
    coal-per-chunk: 6
    iron-per-chunk: 5
    gold-per-chunk: 2
    redstone-per-chunk: 4
    lapis-per-chunk: 2
    copper-per-chunk: 5
    ancient-debris-per-chunk: 1   # netherite source - see README for why this stands in for "netherite ore"
  tree:
    chance-per-chunk: 0.12   # spaced out, not a dense forest
