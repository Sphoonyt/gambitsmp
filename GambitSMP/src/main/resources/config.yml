# GambitSMP configuration

max-equipped-cards: 5

# how a card is "activated" for the ones with cooldowns:
# right-click while sneaking with an empty hand cycles through your
# equipped active cards and triggers the next one that's off cooldown.
active-trigger: sneak-right-click

drop:
  mystery-card-enabled: true

cooldowns:
  # active (sneak+right-click) cards
  nightbringer-seconds: 180
  warden-beam-seconds: 180
  gravity-seconds: 120
  negation-seconds: 45
  berserk-seconds: 30

  # passive on-hit/on-tick cards - cooldown starts the moment they successfully
  # proc, separate from their proc chance
  grounding-bolt-seconds: 8
  frozen-anchor-seconds: 12
  vampiric-seconds: 8
  gluttonous-seconds: 6
  piggys-weight-seconds: 10
  dark-hours-seconds: 45
  hellflame-seconds: 15

chances:
  # active cards now also have a flat chance to actually go off even when off
  # cooldown - sneaking+right-clicking is no longer a guaranteed activation
  active-ability-trigger: 0.15

  frozen-anchor: 0.10       # was 0.08
  grounding-bolt: 0.10
  metal-thief: 0.25
  heavy-swing: 0.03
  dark-hours-per-minute: 0.10
  gruesome-harvest-per-30s: 0.10
  greeds-touch: 0.25
  vampiric: 0.15            # was 0.20

# Phantom rework: land this many hits to trigger a burst of true invisibility
phantom:
  hits-needed: 3
  duration-ticks: 100   # 5 seconds

card-dimension:
  world-name: CardDimension
  overworld-world-name: world   # the world CardDimension's portal sends players to
  surface-y: 64
  portal-width: 5    # interior width (blocks between the side posts)
  portal-height: 4   # interior height (blocks between the lintel and sill)
  ore:
    coal-per-chunk: 20
    iron-per-chunk: 18
    gold-per-chunk: 10
    redstone-per-chunk: 16
    lapis-per-chunk: 10
    copper-per-chunk: 18
    ancient-debris-per-chunk: 4   # netherite source - see README for why this stands in for "netherite ore"
  tree:
    chance-per-chunk: 0.12   # spaced out, not a dense forest
