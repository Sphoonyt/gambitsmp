name: GambitSMP
version: '1.0.0'
main: com.gambitsmp.GambitSMP
api-version: '1.20'
author: GambitSMP
description: Custom card-based ability plugin for GambitSMP

commands:
  gambit:
    description: GambitSMP admin/util command
    usage: /gambit <give|shrine|reset|info> ...
    permission: gambitsmp.admin
    permission-message: You do not have permission to use this command.

permissions:
  gambitsmp.admin:
    description: Access to GambitSMP admin commands
    default: op
